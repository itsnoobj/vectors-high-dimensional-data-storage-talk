<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="monospace">
  <rect width="800" height="380" fill="#1e1e2e"/>

  <!-- App -->
  <rect x="320" y="10" width="160" height="30" fill="#89b4fa" rx="4"/>
  <text x="400" y="30" fill="#1e1e2e" font-size="12" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Split arrows -->
  <line x1="360" y1="40" x2="200" y2="62" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="440" y1="40" x2="600" y2="62" stroke="#f38ba8" stroke-width="1.5"/>

  <!-- PostgreSQL -->
  <rect x="100" y="65" width="200" height="28" fill="#313244" rx="4" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="200" y="84" fill="#a6e3a1" font-size="11" text-anchor="middle" font-weight="bold">PostgreSQL (truth)</text>

  <!-- Vector DB -->
  <rect x="500" y="65" width="200" height="28" fill="#313244" rx="4" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="600" y="84" fill="#f38ba8" font-size="11" text-anchor="middle" font-weight="bold">Vector DB (index)</text>

  <!-- Sync arrow -->
  <line x1="300" y1="79" x2="500" y2="79" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="74" fill="#f9e2af" font-size="9" text-anchor="middle">sync (Kafka/CDC)</text>

  <!-- Failure modes -->
  <text x="100" y="118" fill="#f38ba8" font-size="10">❌ Write fails → stale</text>
  <text x="280" y="118" fill="#f38ba8" font-size="10">❌ Delete missed → ghosts</text>
  <text x="470" y="118" fill="#f38ba8" font-size="10">❌ Model update → re-sync all</text>
  <text x="670" y="118" fill="#f38ba8" font-size="10">❌ Perms → leak</text>

  <!-- Divider -->
  <rect x="50" y="138" width="700" height="1" fill="#585b70"/>

  <!-- Two columns: mitigations vs pain -->
  <text x="230" y="165" fill="#a6e3a1" font-size="12" text-anchor="middle" font-weight="bold">Mitigations</text>
  <text x="100" y="185" fill="#a6adc8" font-size="10">• Outbox pattern, CDC (Debezium)</text>
  <text x="100" y="202" fill="#a6adc8" font-size="10">• Reconciliation jobs</text>
  <text x="100" y="219" fill="#a6adc8" font-size="10">• Managed vector DBs reduce ops</text>

  <rect x="395" y="150" width="1" height="85" fill="#585b70"/>

  <text x="600" y="165" fill="#f38ba8" font-size="12" text-anchor="middle" font-weight="bold">But converged DBs have pain too</text>
  <text x="430" y="185" fill="#a6adc8" font-size="10">• Multi-hour index builds at scale</text>
  <text x="430" y="202" fill="#a6adc8" font-size="10">• VACUUM pressure on updates</text>
  <text x="430" y="219" fill="#a6adc8" font-size="10">• No built-in hybrid search</text>

  <!-- Bottom -->
  <rect x="150" y="250" width="500" height="28" fill="#45475a" rx="4"/>
  <text x="400" y="269" fill="#f9e2af" font-size="13" text-anchor="middle" font-weight="bold">It's a genuine trade-off, not a clear winner.</text>
</svg>
