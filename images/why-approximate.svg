<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" font-family="monospace">
  <rect width="500" height="650" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="250" y="30" fill="#cdd6f4" font-size="16" font-weight="bold" text-anchor="middle">Why Approximate?</text>
  <text x="250" y="50" fill="#a6adc8" font-size="12" text-anchor="middle">Because exact search checks everything.</text>

  <!-- EXACT SEARCH: Big circle, all dots checked -->
  <text x="250" y="80" fill="#f38ba8" font-size="14" text-anchor="middle" font-weight="bold">Exact Search</text>

  <!-- Big circle = entire search space -->
  <circle cx="250" cy="185" r="100" fill="none" stroke="#f38ba8" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="250" y="90" fill="#585b70" font-size="10" text-anchor="middle">entire vector space</text>

  <!-- Query point -->
  <circle cx="250" cy="170" r="8" fill="#89b4fa"/>
  <text x="250" y="174" fill="#1e1e2e" font-size="7" text-anchor="middle">Q</text>

  <!-- All dots checked (scattered, all highlighted red) -->
  <circle cx="180" cy="140" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="210" cy="120" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="290" cy="130" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="320" cy="160" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="300" cy="200" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="270" cy="230" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="200" cy="220" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="170" cy="190" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="230" cy="250" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="310" cy="240" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="190" cy="160" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="260" cy="140" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="330" cy="190" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="220" cy="200" r="5" fill="#f38ba8" opacity="0.6"/>
  <circle cx="280" cy="180" r="5" fill="#a6e3a1"/>
  <circle cx="240" cy="185" r="5" fill="#a6e3a1"/>

  <text x="250" y="300" fill="#f38ba8" font-size="12" text-anchor="middle" font-weight="bold">Checks ALL 100M vectors. 100% accurate.</text>
  <text x="250" y="318" fill="#f38ba8" font-size="12" text-anchor="middle">500ms+ per query. Unusable at scale.</text>

  <!-- Arrow -->
  <text x="250" y="348" fill="#f9e2af" font-size="16" text-anchor="middle">↓ What if we only search nearby?</text>

  <!-- ANN SEARCH: Small circle, only nearby checked -->
  <text x="250" y="378" fill="#a6e3a1" font-size="14" text-anchor="middle" font-weight="bold">Approximate Nearest Neighbor (ANN)</text>

  <!-- Big circle = entire space (faded) -->
  <circle cx="250" cy="480" r="100" fill="none" stroke="#585b70" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Small circle = search region (highlighted) -->
  <circle cx="250" cy="470" r="40" fill="#a6e3a1" opacity="0.08" stroke="#a6e3a1" stroke-width="2"/>

  <!-- Query point -->
  <circle cx="250" cy="465" r="8" fill="#89b4fa"/>
  <text x="250" y="469" fill="#1e1e2e" font-size="7" text-anchor="middle">Q</text>

  <!-- Nearby dots (checked, green) -->
  <circle cx="270" cy="455" r="5" fill="#a6e3a1"/>
  <circle cx="235" cy="480" r="5" fill="#a6e3a1"/>
  <circle cx="260" cy="490" r="5" fill="#a6e3a1"/>
  <circle cx="240" cy="450" r="5" fill="#a6e3a1"/>

  <!-- Far dots (skipped, faded) -->
  <circle cx="180" cy="430" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="320" cy="450" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="310" cy="510" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="190" cy="510" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="170" cy="470" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="330" cy="480" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="200" cy="540" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="300" cy="540" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="340" cy="520" r="4" fill="#585b70" opacity="0.2"/>
  <circle cx="160" cy="500" r="4" fill="#585b70" opacity="0.2"/>

  <text x="250" y="540" fill="#a6e3a1" font-size="12" text-anchor="middle" font-weight="bold">Only checks ~750 vectors. 95-99% accurate.</text>
  <text x="250" y="558" fill="#a6e3a1" font-size="12" text-anchor="middle">1-5ms per query. Production-ready.</text>

  <!-- Bottom insight -->
  <rect x="50" y="580" width="400" height="50" fill="#45475a" rx="6"/>
  <text x="250" y="602" fill="#f9e2af" font-size="13" text-anchor="middle" font-weight="bold">Miss 1-5% of results, but 100x faster.</text>
  <text x="250" y="622" fill="#a6adc8" font-size="11" text-anchor="middle">Worth it for almost every use case.</text>
</svg>
