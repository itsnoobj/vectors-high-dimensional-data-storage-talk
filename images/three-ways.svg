<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="monospace">
  <rect width="800" height="280" fill="#1e1e2e"/>

  <!-- 1. Quantization: Full-res → compressed -->
  <rect x="20" y="15" width="240" height="250" fill="#313244" rx="8" stroke="#4EC9B0" stroke-width="1.5"/>
  <text x="140" y="40" fill="#4EC9B0" font-size="13" text-anchor="middle" font-weight="bold">① Quantization</text>
  
  <!-- Big block → small block -->
  <rect x="50" y="55" width="50" height="50" fill="#f38ba8" rx="3"/>
  <rect x="105" y="55" width="50" height="50" fill="#89b4fa" rx="3"/>
  <rect x="50" y="110" width="50" height="50" fill="#a6e3a1" rx="3"/>
  <rect x="105" y="110" width="50" height="50" fill="#f9e2af" rx="3"/>
  
  <text x="175" y="95" fill="#585b70" font-size="20">→</text>
  
  <rect x="195" y="70" width="22" height="22" fill="#c06070" rx="2"/>
  <rect x="220" y="70" width="22" height="22" fill="#5080b0" rx="2"/>
  <rect x="195" y="95" width="22" height="22" fill="#70a070" rx="2"/>
  <rect x="220" y="95" width="22" height="22" fill="#c0a050" rx="2"/>
  
  <text x="140" y="185" fill="#a6adc8" font-size="10" text-anchor="middle">Shrink each value's precision</text>
  <text x="140" y="200" fill="#a6e3a1" font-size="11" text-anchor="middle" font-weight="bold">4x – 32x less memory</text>
  <text x="140" y="220" fill="#585b70" font-size="10" text-anchor="middle">Search blurry, re-rank sharp</text>
  <text x="140" y="248" fill="#4EC9B0" font-size="10" text-anchor="middle">Biggest lever for most teams</text>

  <!-- 2. DiskANN: RAM + SSD split -->
  <rect x="280" y="15" width="240" height="250" fill="#313244" rx="8" stroke="#4EC9B0" stroke-width="1.5"/>
  <text x="400" y="40" fill="#4EC9B0" font-size="13" text-anchor="middle" font-weight="bold">② DiskANN</text>
  
  <!-- Small RAM box -->
  <rect x="310" y="55" width="180" height="45" fill="#45475a" rx="4" stroke="#a6e3a1" stroke-width="1"/>
  <text x="400" y="73" fill="#a6e3a1" font-size="10" text-anchor="middle">🧠 RAM: compressed graph</text>
  <text x="400" y="88" fill="#585b70" font-size="9" text-anchor="middle">~25 GB</text>
  
  <!-- Arrow down -->
  <text x="400" y="115" fill="#f9e2af" font-size="14" text-anchor="middle">↕ fetch on demand</text>
  
  <!-- Large SSD box -->
  <rect x="310" y="125" width="180" height="45" fill="#45475a" rx="4" stroke="#89b4fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="143" fill="#89b4fa" font-size="10" text-anchor="middle">💾 SSD: full vectors</text>
  <text x="400" y="158" fill="#585b70" font-size="9" text-anchor="middle">~600 GB</text>
  
  <text x="400" y="195" fill="#a6adc8" font-size="10" text-anchor="middle">Navigate graph in RAM</text>
  <text x="400" y="210" fill="#a6adc8" font-size="10" text-anchor="middle">Fetch from SSD to re-rank</text>
  <text x="400" y="230" fill="#a6e3a1" font-size="11" text-anchor="middle" font-weight="bold">Billions on a single node</text>
  <text x="400" y="248" fill="#4EC9B0" font-size="10" text-anchor="middle">When RAM-only is too expensive</text>

  <!-- 3. Matryoshka: Nested dimensions -->
  <rect x="540" y="15" width="240" height="250" fill="#313244" rx="8" stroke="#585b70" stroke-width="1.5"/>
  <text x="660" y="40" fill="#cdd6f4" font-size="13" text-anchor="middle" font-weight="bold">③ Matryoshka Embeddings</text>
  
  <!-- Nested circles like Russian dolls -->
  <circle cx="660" cy="100" r="50" fill="none" stroke="#f38ba8" stroke-width="1.5" opacity="0.5"/>
  <text x="660" y="60" fill="#f38ba8" font-size="8" text-anchor="middle">1536d</text>
  <circle cx="660" cy="100" r="35" fill="none" stroke="#f9e2af" stroke-width="1.5" opacity="0.6"/>
  <text x="700" y="78" fill="#f9e2af" font-size="8">768d</text>
  <circle cx="660" cy="100" r="20" fill="none" stroke="#a6e3a1" stroke-width="2"/>
  <text x="688" y="92" fill="#a6e3a1" font-size="8">256d</text>
  <circle cx="660" cy="100" r="6" fill="#a6e3a1"/>
  
  <text x="660" y="170" fill="#a6adc8" font-size="10" text-anchor="middle">Use fewer dimensions natively</text>
  <text x="660" y="185" fill="#a6adc8" font-size="10" text-anchor="middle">256d beats old 1536d models</text>
  <text x="660" y="205" fill="#a6e3a1" font-size="11" text-anchor="middle" font-weight="bold">6x less storage</text>
  <text x="660" y="225" fill="#585b70" font-size="10" text-anchor="middle">No post-processing needed</text>
  <text x="660" y="248" fill="#585b70" font-size="10" text-anchor="middle">Requires compatible model</text>
</svg>
