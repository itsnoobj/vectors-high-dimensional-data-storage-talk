<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="monospace">
  <rect width="800" height="420" fill="#1e1e2e"/>
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="25" fill="#cdd6f4" font-size="15" font-weight="bold" text-anchor="middle">Search Blurry, Re-rank Sharp</text>

  <!-- STEP 1 -->
  <text x="250" y="52" fill="#f9e2af" font-size="12" text-anchor="middle">Index time: store blurry in RAM, sharp on disk</text>

  <!-- Sharp image (original) -->
  <rect x="50" y="65" width="150" height="90" fill="#313244" rx="6" stroke="#a6e3a1" stroke-width="2"/>
  <rect x="62" y="77" width="28" height="28" fill="#f38ba8" rx="2"/>
  <rect x="94" y="77" width="28" height="28" fill="#f9e2af" rx="2"/>
  <rect x="126" y="77" width="28" height="28" fill="#a6e3a1" rx="2"/>
  <rect x="158" y="77" width="28" height="28" fill="#89b4fa" rx="2"/>
  <rect x="62" y="109" width="28" height="28" fill="#cba6f7" rx="2"/>
  <rect x="94" y="109" width="28" height="28" fill="#fab387" rx="2"/>
  <rect x="126" y="109" width="28" height="28" fill="#94e2d5" rx="2"/>
  <rect x="158" y="109" width="28" height="28" fill="#f5c2e7" rx="2"/>
  <text x="125" y="172" fill="#a6e3a1" font-size="11" text-anchor="middle">FP32 (sharp) · 6 KB</text>
  <text x="125" y="188" fill="#585b70" font-size="11" text-anchor="middle">💾 stored on disk</text>

  <!-- Arrow -->
  <text x="240" y="115" fill="#585b70" font-size="24">→</text>

  <!-- Blurry image (quantized) -->
  <rect x="280" y="65" width="150" height="90" fill="#313244" rx="6" stroke="#f9e2af" stroke-width="2"/>
  <rect x="292" y="77" width="28" height="28" fill="#c06070" rx="2" filter="url(#blur)"/>
  <rect x="324" y="77" width="28" height="28" fill="#c0a050" rx="2" filter="url(#blur)"/>
  <rect x="356" y="77" width="28" height="28" fill="#70a070" rx="2" filter="url(#blur)"/>
  <rect x="388" y="77" width="28" height="28" fill="#5080b0" rx="2" filter="url(#blur)"/>
  <rect x="292" y="109" width="28" height="28" fill="#907090" rx="2" filter="url(#blur)"/>
  <rect x="324" y="109" width="28" height="28" fill="#b08050" rx="2" filter="url(#blur)"/>
  <rect x="356" y="109" width="28" height="28" fill="#609080" rx="2" filter="url(#blur)"/>
  <rect x="388" y="109" width="28" height="28" fill="#c080a0" rx="2" filter="url(#blur)"/>
  <text x="355" y="172" fill="#f9e2af" font-size="11" text-anchor="middle">INT8 (blurry) · 1.5 KB</text>
  <text x="355" y="188" fill="#585b70" font-size="11" text-anchor="middle">🧠 lives in RAM</text>

  <!-- STEP 2: Fast search on blurry -->
  <rect x="500" y="60" width="270" height="140" fill="#313244" rx="6"/>
  <text x="635" y="80" fill="#f9e2af" font-size="12" text-anchor="middle" font-weight="bold">① Fast search (blurry, in RAM)</text>

  <rect x="520" y="92" width="30" height="18" fill="#c06070" rx="2" filter="url(#blur)"/>
  <text x="570" y="106" fill="#a6adc8" font-size="11">d = 0.12</text>
  <rect x="520" y="116" width="30" height="18" fill="#70a070" rx="2" filter="url(#blur)"/>
  <text x="570" y="130" fill="#a6adc8" font-size="11">d = 0.15</text>
  <rect x="520" y="140" width="30" height="18" fill="#907090" rx="2" filter="url(#blur)"/>
  <text x="570" y="154" fill="#a6adc8" font-size="11">d = 0.31</text>
  <rect x="520" y="164" width="30" height="18" fill="#b08050" rx="2" filter="url(#blur)"/>
  <text x="570" y="178" fill="#585b70" font-size="11">d = 0.89 ✗</text>

  <text x="700" y="120" fill="#a6adc8" font-size="10" text-anchor="middle">Scans millions</text>
  <text x="700" y="135" fill="#a6adc8" font-size="10" text-anchor="middle">in milliseconds</text>
  <text x="700" y="155" fill="#a6e3a1" font-size="11" text-anchor="middle">→ top 200</text>
  <text x="700" y="170" fill="#a6e3a1" font-size="11" text-anchor="middle">candidates</text>

  <!-- Arrow down -->
  <text x="400" y="220" fill="#f9e2af" font-size="18" text-anchor="middle">↓</text>

  <!-- STEP 3: Re-rank with sharp -->
  <rect x="80" y="235" width="640" height="150" fill="#313244" rx="8" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="400" y="258" fill="#a6e3a1" font-size="13" text-anchor="middle" font-weight="bold">② Fetch sharp originals from disk → re-rank top candidates</text>

  <!-- Candidate 1 -->
  <text x="180" y="285" fill="#a6adc8" font-size="10" text-anchor="middle">Candidate 1</text>
  <rect x="130" y="293" width="35" height="25" fill="#c06070" rx="2" filter="url(#blur)"/>
  <text x="177" y="310" fill="#585b70" font-size="16">→</text>
  <rect x="190" y="293" width="35" height="25" fill="#f38ba8" rx="2"/>
  <text x="180" y="340" fill="#a6e3a1" font-size="11" text-anchor="middle">d = 0.11 ✓</text>
  <text x="180" y="356" fill="#585b70" font-size="9" text-anchor="middle">was 0.12</text>

  <!-- Candidate 2 -->
  <text x="380" y="285" fill="#a6adc8" font-size="10" text-anchor="middle">Candidate 2</text>
  <rect x="330" y="293" width="35" height="25" fill="#70a070" rx="2" filter="url(#blur)"/>
  <text x="377" y="310" fill="#585b70" font-size="16">→</text>
  <rect x="390" y="293" width="35" height="25" fill="#a6e3a1" rx="2"/>
  <text x="380" y="340" fill="#a6e3a1" font-size="11" text-anchor="middle">d = 0.14 ✓</text>
  <text x="380" y="356" fill="#585b70" font-size="9" text-anchor="middle">was 0.15</text>

  <!-- Candidate 3 -->
  <text x="570" y="285" fill="#a6adc8" font-size="10" text-anchor="middle">Candidate 3</text>
  <rect x="520" y="293" width="35" height="25" fill="#907090" rx="2" filter="url(#blur)"/>
  <text x="567" y="310" fill="#585b70" font-size="16">→</text>
  <rect x="580" y="293" width="35" height="25" fill="#cba6f7" rx="2"/>
  <text x="570" y="340" fill="#f9e2af" font-size="11" text-anchor="middle">d = 0.35 ↑</text>
  <text x="570" y="356" fill="#585b70" font-size="9" text-anchor="middle">was 0.31 — reordered!</text>

  <!-- Bottom insight -->
  <rect x="150" y="392" width="500" height="24" fill="#45475a" rx="4"/>
  <text x="400" y="409" fill="#cdd6f4" font-size="13" text-anchor="middle" font-weight="bold">Blurry finds the neighborhood. Sharp picks the winner.</text>
</svg>
