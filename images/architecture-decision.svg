<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="monospace">
  <rect width="800" height="350" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="400" y="25" fill="#cdd6f4" font-size="14" font-weight="bold" text-anchor="middle">Specialized Vector DB vs Converged DB</text>

  <!-- LEFT: Specialized -->
  <rect x="30" y="45" width="350" height="280" fill="#313244" rx="8" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="205" y="70" fill="#f38ba8" font-size="13" text-anchor="middle" font-weight="bold">Specialized Vector DB</text>
  <text x="205" y="88" fill="#585b70" font-size="10" text-anchor="middle">Pinecone, Qdrant, Weaviate</text>

  <!-- App box -->
  <rect x="130" y="100" width="150" height="30" fill="#89b4fa" rx="4"/>
  <text x="205" y="120" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Two arrows down -->
  <line x1="160" y1="130" x2="110" y2="155" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="250" y1="130" x2="300" y2="155" stroke="#f38ba8" stroke-width="1.5"/>

  <!-- PostgreSQL -->
  <rect x="55" y="158" width="120" height="35" fill="#45475a" rx="4" stroke="#a6e3a1" stroke-width="1"/>
  <text x="115" y="180" fill="#a6e3a1" font-size="10" text-anchor="middle">PostgreSQL</text>

  <!-- Vector DB -->
  <rect x="235" y="158" width="120" height="35" fill="#45475a" rx="4" stroke="#f38ba8" stroke-width="1"/>
  <text x="295" y="180" fill="#f38ba8" font-size="10" text-anchor="middle">Vector DB</text>

  <!-- Sync arrow -->
  <line x1="175" y1="175" x2="235" y2="175" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="205" y="168" fill="#f9e2af" font-size="8" text-anchor="middle">sync</text>

  <!-- Pros/Cons -->
  <text x="60" y="215" fill="#a6e3a1" font-size="10">✅ Cutting-edge features</text>
  <text x="60" y="232" fill="#a6e3a1" font-size="10">✅ Native sharding at scale</text>
  <text x="60" y="249" fill="#a6e3a1" font-size="10">✅ Multi-modal search</text>
  <text x="60" y="272" fill="#f38ba8" font-size="10">❌ Two systems to manage</text>
  <text x="60" y="289" fill="#f38ba8" font-size="10">❌ Data sync tax</text>
  <text x="60" y="306" fill="#f38ba8" font-size="10">❌ Eventual consistency</text>

  <!-- VS -->
  <text x="400" y="190" fill="#585b70" font-size="18" text-anchor="middle" font-weight="bold">vs</text>

  <!-- RIGHT: Converged -->
  <rect x="420" y="45" width="350" height="280" fill="#313244" rx="8" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="595" y="70" fill="#a6e3a1" font-size="13" text-anchor="middle" font-weight="bold">Converged DB</text>
  <text x="595" y="88" fill="#585b70" font-size="10" text-anchor="middle">pgvector, Oracle 23ai, Mongo Atlas</text>

  <!-- App box -->
  <rect x="520" y="100" width="150" height="30" fill="#89b4fa" rx="4"/>
  <text x="595" y="120" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Single arrow down -->
  <line x1="595" y1="130" x2="595" y2="155" stroke="#a6e3a1" stroke-width="2"/>

  <!-- Single DB -->
  <rect x="510" y="158" width="170" height="35" fill="#45475a" rx="4" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="595" y="174" fill="#a6e3a1" font-size="10" text-anchor="middle">PostgreSQL + vectors</text>
  <text x="595" y="187" fill="#585b70" font-size="9" text-anchor="middle">single source of truth</text>

  <!-- Pros/Cons -->
  <text x="450" y="215" fill="#a6e3a1" font-size="10">✅ One system, ACID</text>
  <text x="450" y="232" fill="#a6e3a1" font-size="10">✅ Full SQL + joins</text>
  <text x="450" y="249" fill="#a6e3a1" font-size="10">✅ No sync needed</text>
  <text x="450" y="272" fill="#f38ba8" font-size="10">❌ Scaling limits (single node)</text>
  <text x="450" y="289" fill="#f38ba8" font-size="10">❌ Index builds can be slow</text>
  <text x="450" y="306" fill="#f38ba8" font-size="10">❌ Catching up on features</text>
</svg>
