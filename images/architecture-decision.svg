<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" font-family="monospace">
  <rect width="520" height="620" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="260" y="25" fill="#cdd6f4" font-size="14" font-weight="bold" text-anchor="middle">Specialized Vector DB vs Converged DB</text>

  <!-- TOP: Specialized -->
  <rect x="20" y="40" width="480" height="255" fill="#313244" rx="8" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="260" y="63" fill="#f38ba8" font-size="13" text-anchor="middle" font-weight="bold">Specialized Vector DB</text>
  <text x="260" y="80" fill="#585b70" font-size="10" text-anchor="middle">Pinecone, Qdrant, Weaviate</text>

  <!-- App box -->
  <rect x="185" y="92" width="150" height="30" fill="#89b4fa" rx="4"/>
  <text x="260" y="112" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Two arrows down -->
  <line x1="220" y1="122" x2="150" y2="150" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="300" y1="122" x2="370" y2="150" stroke="#f38ba8" stroke-width="1.5"/>

  <!-- PostgreSQL -->
  <rect x="80" y="153" width="130" height="35" fill="#45475a" rx="4" stroke="#a6e3a1" stroke-width="1"/>
  <text x="145" y="175" fill="#a6e3a1" font-size="10" text-anchor="middle">PostgreSQL</text>

  <!-- Vector DB -->
  <rect x="310" y="153" width="130" height="35" fill="#45475a" rx="4" stroke="#f38ba8" stroke-width="1"/>
  <text x="375" y="175" fill="#f38ba8" font-size="10" text-anchor="middle">Vector DB</text>

  <!-- Sync arrow -->
  <line x1="210" y1="170" x2="310" y2="170" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="260" y="163" fill="#f9e2af" font-size="8" text-anchor="middle">sync</text>

  <!-- Pros/Cons -->
  <text x="45" y="210" fill="#a6e3a1" font-size="10">✅ Cutting-edge features</text>
  <text x="45" y="227" fill="#a6e3a1" font-size="10">✅ Native sharding at scale</text>
  <text x="45" y="244" fill="#a6e3a1" font-size="10">✅ Multi-modal search</text>
  <text x="270" y="210" fill="#f38ba8" font-size="10">❌ Two systems to manage</text>
  <text x="270" y="227" fill="#f38ba8" font-size="10">❌ Data sync tax</text>
  <text x="270" y="244" fill="#f38ba8" font-size="10">❌ Eventual consistency</text>

  <!-- VS divider -->
  <text x="260" y="315" fill="#585b70" font-size="18" text-anchor="middle" font-weight="bold">vs</text>

  <!-- BOTTOM: Converged -->
  <rect x="20" y="330" width="480" height="270" fill="#313244" rx="8" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="260" y="353" fill="#a6e3a1" font-size="13" text-anchor="middle" font-weight="bold">Converged DB</text>
  <text x="260" y="370" fill="#585b70" font-size="10" text-anchor="middle">pgvector, Oracle 23ai, Mongo Atlas</text>

  <!-- App box -->
  <rect x="185" y="382" width="150" height="30" fill="#89b4fa" rx="4"/>
  <text x="260" y="402" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Single arrow down -->
  <line x1="260" y1="412" x2="260" y2="440" stroke="#a6e3a1" stroke-width="2"/>

  <!-- Single DB -->
  <rect x="165" y="443" width="190" height="35" fill="#45475a" rx="4" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="260" y="459" fill="#a6e3a1" font-size="10" text-anchor="middle">PostgreSQL + vectors</text>
  <text x="260" y="472" fill="#585b70" font-size="9" text-anchor="middle">single source of truth</text>

  <!-- Pros/Cons -->
  <text x="45" y="502" fill="#a6e3a1" font-size="10">✅ One system, ACID</text>
  <text x="45" y="519" fill="#a6e3a1" font-size="10">✅ Full SQL + joins</text>
  <text x="45" y="536" fill="#a6e3a1" font-size="10">✅ No sync needed</text>
  <text x="270" y="502" fill="#f38ba8" font-size="10">❌ Scaling limits (single node)</text>
  <text x="270" y="519" fill="#f38ba8" font-size="10">❌ Index builds can be slow</text>
  <text x="270" y="536" fill="#f38ba8" font-size="10">❌ Catching up on features</text>
</svg>