<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="monospace">
  <rect width="800" height="320" fill="#1e1e2e"/>

  <!-- App -->
  <rect x="320" y="15" width="160" height="40" fill="#89b4fa" rx="6"/>
  <text x="400" y="40" fill="#1e1e2e" font-size="14" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Split arrows -->
  <line x1="360" y1="55" x2="180" y2="90" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="440" y1="55" x2="620" y2="90" stroke="#f38ba8" stroke-width="2"/>
  
  <!-- PostgreSQL -->
  <rect x="80" y="90" width="200" height="50" fill="#313244" rx="6" stroke="#a6e3a1" stroke-width="2"/>
  <text x="180" y="120" fill="#a6e3a1" font-size="14" text-anchor="middle" font-weight="bold">PostgreSQL (truth)</text>

  <!-- Vector DB -->
  <rect x="520" y="90" width="200" height="50" fill="#313244" rx="6" stroke="#f38ba8" stroke-width="2"/>
  <text x="620" y="120" fill="#f38ba8" font-size="14" text-anchor="middle" font-weight="bold">Vector DB (index)</text>

  <!-- Sync arrow -->
  <line x1="280" y1="115" x2="520" y2="115" stroke="#f9e2af" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="108" fill="#f9e2af" font-size="11" text-anchor="middle">sync pipeline (Kafka/CDC)</text>

  <!-- Failure modes -->
  <text x="400" y="175" fill="#cdd6f4" font-size="14" text-anchor="middle" font-weight="bold">What goes wrong:</text>
  
  <text x="60" y="205" fill="#f38ba8" font-size="12">❌  Vector DB write fails</text>
  <text x="60" y="222" fill="#a6adc8" font-size="11">    → stale search results, users see old data</text>
  
  <text x="60" y="248" fill="#f38ba8" font-size="12">❌  Doc deleted from Postgres only</text>
  <text x="60" y="265" fill="#a6adc8" font-size="11">    → ghost results, deleted content still searchable</text>
  
  <text x="430" y="205" fill="#f38ba8" font-size="12">❌  Embedding model updated</text>
  <text x="430" y="222" fill="#a6adc8" font-size="11">    → must re-embed everything in both systems</text>
  
  <text x="430" y="248" fill="#f38ba8" font-size="12">❌  User permissions change</text>
  <text x="430" y="265" fill="#a6adc8" font-size="11">    → vector DB returns unauthorized results</text>

  <!-- Bottom -->
  <rect x="150" y="285" width="500" height="28" fill="#45475a" rx="4"/>
  <text x="400" y="304" fill="#f9e2af" font-size="13" text-anchor="middle" font-weight="bold">Two databases = eventual consistency. Converged DB = one source of truth.</text>
</svg>
