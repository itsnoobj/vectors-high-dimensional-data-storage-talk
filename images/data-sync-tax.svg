<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 700" font-family="monospace">
  <rect width="480" height="700" fill="#1e1e2e"/>

  <!-- App -->
  <rect x="150" y="20" width="180" height="45" fill="#89b4fa" rx="6"/>
  <text x="240" y="48" fill="#1e1e2e" font-size="16" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Split arrows -->
  <line x1="200" y1="65" x2="110" y2="110" stroke="#a6e3a1" stroke-width="2.5"/>
  <line x1="280" y1="65" x2="370" y2="110" stroke="#f38ba8" stroke-width="2.5"/>

  <!-- PostgreSQL -->
  <rect x="20" y="110" width="200" height="50" fill="#313244" rx="6" stroke="#a6e3a1" stroke-width="2"/>
  <text x="120" y="141" fill="#a6e3a1" font-size="15" text-anchor="middle" font-weight="bold">PostgreSQL</text>
  <text x="120" y="155" fill="#585b70" font-size="10" text-anchor="middle">(source of truth)</text>

  <!-- Vector DB -->
  <rect x="260" y="110" width="200" height="50" fill="#313244" rx="6" stroke="#f38ba8" stroke-width="2"/>
  <text x="360" y="141" fill="#f38ba8" font-size="15" text-anchor="middle" font-weight="bold">Vector DB</text>
  <text x="360" y="155" fill="#585b70" font-size="10" text-anchor="middle">(search index)</text>

  <!-- Sync arrow -->
  <line x1="220" y1="135" x2="260" y2="135" stroke="#f9e2af" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="240" y="125" fill="#f9e2af" font-size="11" text-anchor="middle">sync</text>

  <!-- Failure modes title -->
  <text x="240" y="210" fill="#cdd6f4" font-size="16" text-anchor="middle" font-weight="bold">What goes wrong:</text>

  <!-- Failure 1 -->
  <rect x="25" y="230" width="430" height="65" fill="#313244" rx="6"/>
  <text x="50" y="255" fill="#f38ba8" font-size="14">❌  Vector DB write fails</text>
  <text x="50" y="278" fill="#a6adc8" font-size="12">    → stale search results, users see old data</text>

  <!-- Failure 2 -->
  <rect x="25" y="308" width="430" height="65" fill="#313244" rx="6"/>
  <text x="50" y="333" fill="#f38ba8" font-size="14">❌  Doc deleted from Postgres only</text>
  <text x="50" y="356" fill="#a6adc8" font-size="12">    → ghost results, deleted content searchable</text>

  <!-- Failure 3 -->
  <rect x="25" y="386" width="430" height="65" fill="#313244" rx="6"/>
  <text x="50" y="411" fill="#f38ba8" font-size="14">❌  Embedding model updated</text>
  <text x="50" y="434" fill="#a6adc8" font-size="12">    → must re-embed everything in both systems</text>

  <!-- Failure 4 -->
  <rect x="25" y="464" width="430" height="65" fill="#313244" rx="6"/>
  <text x="50" y="489" fill="#f38ba8" font-size="14">❌  User permissions change</text>
  <text x="50" y="512" fill="#a6adc8" font-size="12">    → vector DB returns unauthorized results</text>

  <!-- Bottom insight -->
  <rect x="40" y="560" width="400" height="50" fill="#45475a" rx="6"/>
  <text x="240" y="582" fill="#f9e2af" font-size="14" text-anchor="middle" font-weight="bold">Two databases = eventual consistency.</text>
  <text x="240" y="600" fill="#f9e2af" font-size="14" text-anchor="middle" font-weight="bold">Converged DB = one source of truth.</text>

  <!-- Trade-off note -->
  <text x="240" y="650" fill="#cdd6f4" font-size="13" text-anchor="middle" font-weight="bold">It's a genuine trade-off, not a clear winner.</text>
  <text x="240" y="675" fill="#585b70" font-size="11" text-anchor="middle">Mitigations exist (CDC, outbox pattern) but add cost.</text>
</svg>
