<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="monospace">
  <rect width="800" height="320" fill="#1e1e2e"/>

  <!-- HNSW side -->
  <text x="200" y="30" fill="#f38ba8" font-size="18" font-weight="bold" text-anchor="middle">HNSW (RAM-only)</text>
  
  <!-- RAM box - large -->
  <rect x="40" y="50" width="320" height="200" fill="#313244" rx="8" stroke="#f38ba8" stroke-width="2"/>
  <text x="200" y="75" fill="#f38ba8" font-size="14" text-anchor="middle">RAM (~920 GB for 100M vectors)</text>
  
  <!-- Graph nodes -->
  <circle cx="100" cy="120" r="12" fill="#f38ba8"/>
  <circle cx="160" cy="100" r="12" fill="#f38ba8"/>
  <circle cx="220" cy="130" r="12" fill="#f38ba8"/>
  <circle cx="280" cy="110" r="12" fill="#f38ba8"/>
  <circle cx="140" cy="170" r="12" fill="#f38ba8"/>
  <circle cx="200" cy="190" r="12" fill="#f38ba8"/>
  <circle cx="260" cy="175" r="12" fill="#f38ba8"/>
  <circle cx="310" cy="160" r="12" fill="#f38ba8"/>
  
  <!-- Graph edges -->
  <line x1="100" y1="120" x2="160" y2="100" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="100" x2="220" y2="130" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="130" x2="280" y2="110" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="120" x2="140" y2="170" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="170" x2="200" y2="190" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="190" x2="260" y2="175" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="260" y1="175" x2="310" y2="160" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="130" x2="200" y2="190" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="110" x2="310" y2="160" stroke="#f38ba8" stroke-width="1" opacity="0.5"/>
  
  <!-- Full vectors label -->
  <text x="200" y="230" fill="#a6adc8" font-size="12" text-anchor="middle">Graph + Full FP32 vectors</text>
  
  <text x="200" y="275" fill="#f38ba8" font-size="14" text-anchor="middle">💰 ~$5,000/mo</text>
  <text x="200" y="295" fill="#a6adc8" font-size="13" text-anchor="middle">⚡ 1-5ms latency</text>

  <!-- Arrow -->
  <text x="400" y="155" fill="#cdd6f4" font-size="30" text-anchor="middle">vs</text>

  <!-- DiskANN side -->
  <text x="600" y="30" fill="#a6e3a1" font-size="18" font-weight="bold" text-anchor="middle">DiskANN (RAM + SSD)</text>
  
  <!-- RAM box - small -->
  <rect x="460" y="50" width="280" height="100" fill="#313244" rx="8" stroke="#a6e3a1" stroke-width="2"/>
  <text x="600" y="75" fill="#a6e3a1" font-size="14" text-anchor="middle">RAM (~10-25 GB)</text>
  
  <!-- Compressed nodes (smaller) -->
  <circle cx="510" cy="110" r="6" fill="#a6e3a1"/>
  <circle cx="540" cy="100" r="6" fill="#a6e3a1"/>
  <circle cx="570" cy="115" r="6" fill="#a6e3a1"/>
  <circle cx="600" cy="105" r="6" fill="#a6e3a1"/>
  <circle cx="630" cy="118" r="6" fill="#a6e3a1"/>
  <circle cx="660" cy="98" r="6" fill="#a6e3a1"/>
  <circle cx="690" cy="112" r="6" fill="#a6e3a1"/>
  
  <!-- Compressed edges -->
  <line x1="510" y1="110" x2="540" y2="100" stroke="#a6e3a1" stroke-width="1" opacity="0.5"/>
  <line x1="540" y1="100" x2="570" y2="115" stroke="#a6e3a1" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="115" x2="600" y2="105" stroke="#a6e3a1" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="105" x2="630" y2="118" stroke="#a6e3a1" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="118" x2="660" y2="98" stroke="#a6e3a1" stroke-width="1" opacity="0.5"/>
  <line x1="660" y1="98" x2="690" y2="112" stroke="#a6e3a1" stroke-width="1" opacity="0.5"/>
  
  <text x="600" y="140" fill="#a6adc8" font-size="11" text-anchor="middle">Compressed graph + PQ codes</text>
  
  <!-- Arrow down to SSD -->
  <line x1="600" y1="155" x2="600" y2="175" stroke="#cdd6f4" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cdd6f4"/></marker></defs>
  
  <!-- SSD box -->
  <rect x="460" y="180" width="280" height="70" fill="#45475a" rx="8" stroke="#89b4fa" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="600" y="205" fill="#89b4fa" font-size="14" text-anchor="middle">NVMe SSD</text>
  <text x="600" y="225" fill="#a6adc8" font-size="11" text-anchor="middle">Full FP32 vectors (fetched for re-rank)</text>
  
  <text x="600" y="275" fill="#a6e3a1" font-size="14" text-anchor="middle">💰 ~$200-300/mo</text>
  <text x="600" y="295" fill="#a6adc8" font-size="13" text-anchor="middle">⚡ 5-15ms latency</text>
</svg>
