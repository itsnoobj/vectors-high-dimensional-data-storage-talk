<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" font-family="monospace">
  <rect width="500" height="650" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="250" y="22" fill="#cdd6f4" font-size="14" font-weight="bold" text-anchor="middle">DiskANN: How a Query Flows</text>

  <!-- RAM zone -->
  <rect x="20" y="35" width="460" height="390" fill="#313244" rx="8" stroke="#4EC9B0" stroke-width="1.5"/>
  <text x="40" y="55" fill="#4EC9B0" font-size="12" font-weight="bold">🧠 RAM (~25 GB)</text>
  <text x="40" y="70" fill="#585b70" font-size="10">Compressed graph + PQ codes</text>

  <!-- Step 1: Query arrives -->
  <rect x="40" y="82" width="200" height="26" fill="#89b4fa" rx="4"/>
  <text x="140" y="99" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">① Query arrives</text>

  <!-- Arrow down -->
  <text x="140" y="120" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 2: Start at medoid -->
  <rect x="40" y="126" width="200" height="26" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="140" y="143" fill="#4EC9B0" font-size="10" text-anchor="middle">② Start at medoid (center node)</text>
  <!-- Small graph showing medoid -->
  <circle cx="310" cy="95" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="340" cy="85" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="370" cy="100" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="330" cy="115" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="400" cy="92" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="420" cy="110" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="440" cy="88" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="380" cy="125" r="5" fill="#585b70" opacity="0.4"/>
  <circle cx="360" cy="98" r="7" fill="#f9e2af"/>
  <text x="360" y="101" fill="#1e1e2e" font-size="6" text-anchor="middle">M</text>
  <line x1="360" y1="98" x2="310" y2="95" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="360" y1="98" x2="340" y2="85" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="360" y1="98" x2="370" y2="100" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="360" y1="98" x2="400" y2="92" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="360" y1="98" x2="330" y2="115" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="370" y1="100" x2="420" y2="110" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="92" x2="440" y2="88" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="330" y1="115" x2="380" y2="125" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>

  <!-- Arrow down -->
  <text x="140" y="165" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 3: Load PQ codes -->
  <rect x="40" y="171" width="200" height="26" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="140" y="188" fill="#4EC9B0" font-size="10" text-anchor="middle">③ Load neighbors' PQ codes</text>
  <!-- PQ codes -->
  <rect x="270" y="174" width="30" height="16" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="285" y="186" fill="#cdd6f4" font-size="8" text-anchor="middle">#42</text>
  <rect x="305" y="174" width="30" height="16" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="320" y="186" fill="#cdd6f4" font-size="8" text-anchor="middle">#7</text>
  <rect x="340" y="174" width="30" height="16" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="355" y="186" fill="#cdd6f4" font-size="8" text-anchor="middle">#91</text>
  <rect x="375" y="174" width="30" height="16" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="390" y="186" fill="#cdd6f4" font-size="8" text-anchor="middle">#15</text>
  <text x="430" y="186" fill="#585b70" font-size="8">← RAM</text>

  <!-- Arrow down -->
  <text x="140" y="210" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 4: Approximate distances -->
  <rect x="40" y="216" width="200" height="26" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="140" y="233" fill="#4EC9B0" font-size="10" text-anchor="middle">④ Approx distances (PQ lookup)</text>
  <text x="280" y="233" fill="#a6e3a1" font-size="10">d≈0.12</text>
  <text x="335" y="233" fill="#a6e3a1" font-size="10">d≈0.31</text>
  <text x="390" y="233" fill="#a6adc8" font-size="10">d≈0.67</text>
  <text x="445" y="233" fill="#585b70" font-size="10">d≈0.89</text>

  <!-- Arrow down -->
  <text x="140" y="255" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 5: Pick best, explore -->
  <rect x="40" y="261" width="200" height="26" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="140" y="278" fill="#4EC9B0" font-size="10" text-anchor="middle">⑤ Hop to best → repeat 20-30x</text>
  <!-- Highlighted path -->
  <circle cx="310" cy="270" r="5" fill="#f9e2af" opacity="0.6"/>
  <circle cx="340" cy="278" r="5" fill="#f9e2af" opacity="0.6"/>
  <circle cx="375" cy="268" r="5" fill="#f9e2af" opacity="0.6"/>
  <circle cx="405" cy="280" r="5" fill="#a6e3a1"/>
  <line x1="310" y1="270" x2="340" y2="278" stroke="#f9e2af" stroke-width="2"/>
  <line x1="340" y1="278" x2="375" y2="268" stroke="#f9e2af" stroke-width="2"/>
  <line x1="375" y1="268" x2="405" y2="280" stroke="#f9e2af" stroke-width="2"/>
  <text x="425" y="283" fill="#a6e3a1" font-size="9">found!</text>

  <!-- Arrow down -->
  <text x="140" y="300" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 6: SSD fetch -->
  <rect x="40" y="306" width="200" height="26" fill="#89b4fa" rx="4" opacity="0.4"/>
  <text x="140" y="323" fill="#89b4fa" font-size="10" text-anchor="middle">⑥ Top ~200 → fetch from SSD</text>

  <!-- Arrow to SSD zone -->
  <line x1="140" y1="332" x2="140" y2="345" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="200" y="345" fill="#89b4fa" font-size="9">fetch full FP32 vectors ↓</text>

  <!-- SSD zone -->
  <rect x="20" y="435" width="460" height="130" fill="#45475a" rx="8" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="455" fill="#89b4fa" font-size="12" font-weight="bold">💾 NVMe SSD</text>
  <text x="40" y="470" fill="#585b70" font-size="10">Full FP32 vectors</text>

  <!-- SSD contents - left side -->
  <rect x="40" y="480" width="100" height="12" fill="#585b70" rx="2" opacity="0.3"/>
  <rect x="40" y="496" width="100" height="12" fill="#585b70" rx="2" opacity="0.3"/>
  <rect x="40" y="512" width="100" height="12" fill="#585b70" rx="2" opacity="0.3"/>
  <text x="90" y="540" fill="#585b70" font-size="9" text-anchor="middle">millions of vectors</text>

  <!-- Fetched vectors - right side -->
  <rect x="200" y="480" width="100" height="12" fill="#a6e3a1" rx="2" opacity="0.5"/>
  <rect x="200" y="496" width="100" height="12" fill="#a6e3a1" rx="2" opacity="0.5"/>
  <rect x="200" y="512" width="100" height="12" fill="#a6e3a1" rx="2" opacity="0.5"/>
  <text x="250" y="540" fill="#a6e3a1" font-size="9" text-anchor="middle">→ re-rank exact</text>

  <!-- Cost callout -->
  <text x="400" y="500" fill="#585b70" font-size="10" text-anchor="middle">Only ~200</text>
  <text x="400" y="515" fill="#585b70" font-size="10" text-anchor="middle">SSD reads</text>
  <text x="400" y="530" fill="#585b70" font-size="10" text-anchor="middle">not 1 billion</text>

  <!-- Step 7: Result -->
  <rect x="40" y="580" width="420" height="30" fill="#a6e3a1" rx="4" opacity="0.2"/>
  <text x="250" y="600" fill="#a6e3a1" font-size="12" text-anchor="middle" font-weight="bold">⑦ Re-rank with exact distances → return top-k</text>

  <!-- RAM/SSD arrow connector -->
  <line x1="140" y1="355" x2="140" y2="435" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
