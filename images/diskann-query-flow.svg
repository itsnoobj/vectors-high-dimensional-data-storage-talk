<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="monospace">
  <rect width="800" height="440" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="400" y="22" fill="#cdd6f4" font-size="14" font-weight="bold" text-anchor="middle">DiskANN: How a Query Flows</text>

  <!-- RAM zone -->
  <rect x="30" y="35" width="520" height="340" fill="#313244" rx="8" stroke="#4EC9B0" stroke-width="1.5"/>
  <text x="50" y="55" fill="#4EC9B0" font-size="12" font-weight="bold">🧠 RAM (~25 GB)</text>
  <text x="50" y="70" fill="#585b70" font-size="10">Compressed graph + PQ codes</text>

  <!-- SSD zone -->
  <rect x="580" y="35" width="195" height="340" fill="#45475a" rx="8" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="55" fill="#89b4fa" font-size="12" font-weight="bold">💾 NVMe SSD</text>
  <text x="600" y="70" fill="#585b70" font-size="10">Full FP32 vectors</text>

  <!-- Step 1: Query arrives -->
  <rect x="60" y="85" width="180" height="28" fill="#89b4fa" rx="4"/>
  <text x="150" y="103" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">① Query arrives</text>

  <!-- Arrow down -->
  <line x1="150" y1="113" x2="150" y2="130" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="150" y="128" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 2: Start at medoid -->
  <rect x="60" y="135" width="180" height="28" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="150" y="153" fill="#4EC9B0" font-size="10" text-anchor="middle">② Start at medoid (center node)</text>
  <!-- Small graph showing medoid -->
  <circle cx="310" cy="100" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="350" cy="90" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="380" cy="110" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="340" cy="130" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="420" cy="100" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="450" cy="120" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="480" cy="95" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="390" cy="145" r="6" fill="#585b70" opacity="0.4"/>
  <circle cx="370" cy="105" r="8" fill="#f9e2af"/>
  <text x="370" y="109" fill="#1e1e2e" font-size="7" text-anchor="middle">M</text>
  <!-- Edges -->
  <line x1="370" y1="105" x2="310" y2="100" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="370" y1="105" x2="350" y2="90" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="370" y1="105" x2="380" y2="110" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="370" y1="105" x2="420" y2="100" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="370" y1="105" x2="340" y2="130" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="380" y1="110" x2="450" y2="120" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="420" y1="100" x2="480" y2="95" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>
  <line x1="340" y1="130" x2="390" y2="145" stroke="#585b70" stroke-width="0.8" opacity="0.3"/>

  <!-- Arrow down -->
  <line x1="150" y1="163" x2="150" y2="178" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="150" y="177" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 3: Load PQ codes -->
  <rect x="60" y="183" width="180" height="28" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="150" y="201" fill="#4EC9B0" font-size="10" text-anchor="middle">③ Load neighbors' PQ codes</text>
  <!-- PQ codes visualization -->
  <rect x="290" y="183" width="30" height="18" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="305" y="196" fill="#cdd6f4" font-size="8" text-anchor="middle">#42</text>
  <rect x="325" y="183" width="30" height="18" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="340" y="196" fill="#cdd6f4" font-size="8" text-anchor="middle">#7</text>
  <rect x="360" y="183" width="30" height="18" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="375" y="196" fill="#cdd6f4" font-size="8" text-anchor="middle">#91</text>
  <rect x="395" y="183" width="30" height="18" fill="#4EC9B0" rx="2" opacity="0.4"/>
  <text x="410" y="196" fill="#cdd6f4" font-size="8" text-anchor="middle">#15</text>
  <text x="460" y="196" fill="#585b70" font-size="9">← tiny, in RAM</text>

  <!-- Arrow down -->
  <line x1="150" y1="211" x2="150" y2="226" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="150" y="225" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 4: Approximate distances -->
  <rect x="60" y="231" width="180" height="28" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="150" y="249" fill="#4EC9B0" font-size="10" text-anchor="middle">④ Approx distances (PQ lookup)</text>
  <!-- Distance results -->
  <text x="290" y="248" fill="#a6e3a1" font-size="10">d≈0.12</text>
  <text x="345" y="248" fill="#a6e3a1" font-size="10">d≈0.31</text>
  <text x="400" y="248" fill="#a6adc8" font-size="10">d≈0.67</text>
  <text x="455" y="248" fill="#585b70" font-size="10">d≈0.89</text>

  <!-- Arrow down -->
  <line x1="150" y1="259" x2="150" y2="274" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="150" y="273" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 5: Pick best, explore -->
  <rect x="60" y="279" width="180" height="28" fill="#4EC9B0" rx="4" opacity="0.3"/>
  <text x="150" y="297" fill="#4EC9B0" font-size="10" text-anchor="middle">⑤ Hop to best → repeat 20-30x</text>
  <!-- Highlighted path in graph -->
  <circle cx="370" cy="280" r="6" fill="#f9e2af" opacity="0.6"/>
  <circle cx="400" cy="290" r="6" fill="#f9e2af" opacity="0.6"/>
  <circle cx="435" cy="282" r="6" fill="#f9e2af" opacity="0.6"/>
  <circle cx="465" cy="295" r="6" fill="#a6e3a1"/>
  <line x1="370" y1="280" x2="400" y2="290" stroke="#f9e2af" stroke-width="2"/>
  <line x1="400" y1="290" x2="435" y2="282" stroke="#f9e2af" stroke-width="2"/>
  <line x1="435" y1="282" x2="465" y2="295" stroke="#f9e2af" stroke-width="2"/>
  <text x="490" y="298" fill="#a6e3a1" font-size="9">found!</text>

  <!-- Arrow down -->
  <line x1="150" y1="307" x2="150" y2="322" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="150" y="321" fill="#f9e2af" font-size="10" text-anchor="middle">↓</text>

  <!-- Step 6: SSD fetch + rerank -->
  <rect x="60" y="327" width="180" height="28" fill="#89b4fa" rx="4" opacity="0.4"/>
  <text x="150" y="345" fill="#89b4fa" font-size="10" text-anchor="middle">⑥ Top ~200 → fetch from SSD</text>

  <!-- Arrow to SSD -->
  <line x1="240" y1="341" x2="580" y2="341" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="410" y="335" fill="#89b4fa" font-size="9" text-anchor="middle">fetch full FP32 vectors</text>

  <!-- SSD contents -->
  <rect x="600" y="90" width="155" height="260" fill="#45475a" rx="4" opacity="0.5"/>
  <rect x="615" y="105" width="125" height="14" fill="#585b70" rx="2" opacity="0.3"/>
  <rect x="615" y="125" width="125" height="14" fill="#585b70" rx="2" opacity="0.3"/>
  <rect x="615" y="145" width="125" height="14" fill="#585b70" rx="2" opacity="0.3"/>
  <rect x="615" y="165" width="125" height="14" fill="#585b70" rx="2" opacity="0.3"/>
  <text x="677" y="200" fill="#585b70" font-size="9" text-anchor="middle">...</text>
  <text x="677" y="220" fill="#585b70" font-size="9" text-anchor="middle">millions of</text>
  <text x="677" y="235" fill="#585b70" font-size="9" text-anchor="middle">full vectors</text>

  <!-- Fetched vectors highlighted -->
  <rect x="615" y="270" width="125" height="14" fill="#a6e3a1" rx="2" opacity="0.5"/>
  <rect x="615" y="290" width="125" height="14" fill="#a6e3a1" rx="2" opacity="0.5"/>
  <rect x="615" y="310" width="125" height="14" fill="#a6e3a1" rx="2" opacity="0.5"/>
  <text x="677" y="340" fill="#a6e3a1" font-size="9" text-anchor="middle">→ re-rank exact</text>

  <!-- Bottom result -->
  <rect x="60" y="375" width="480" height="28" fill="#a6e3a1" rx="4" opacity="0.2"/>
  <text x="300" y="393" fill="#a6e3a1" font-size="12" text-anchor="middle" font-weight="bold">⑦ Re-rank with exact distances → return top-k results</text>

  <!-- Cost callout -->
  <text x="677" y="405" fill="#585b70" font-size="10" text-anchor="middle">Only ~200 SSD reads</text>
  <text x="677" y="420" fill="#585b70" font-size="10" text-anchor="middle">not 1 billion</text>
</svg>
