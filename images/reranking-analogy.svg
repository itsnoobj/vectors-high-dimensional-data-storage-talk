<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 650" font-family="monospace">
  <rect width="520" height="650" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="260" y="25" fill="#cdd6f4" font-size="15" font-weight="bold" text-anchor="middle">Re-ranking: The Hiring Analogy</text>

  <!-- Stage 1: Resume screening -->
  <rect x="30" y="42" width="460" height="68" fill="#313244" rx="8" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="50" y="64" fill="#89b4fa" font-size="12" font-weight="bold">① Resume Screen</text>
  <text x="260" y="64" fill="#585b70" font-size="10">10,000 applicants</text>
  <text x="50" y="86" fill="#585b70" font-size="14">👤👤👤👤👤👤👤👤👤👤</text>
  <text x="380" y="86" fill="#89b4fa" font-size="10">30s each</text>

  <!-- Arrow down -->
  <text x="250" y="124" fill="#f9e2af" font-size="11" text-anchor="middle">↓ 100 candidates</text>

  <!-- Stage 2: Phone screen -->
  <rect x="30" y="132" width="460" height="68" fill="#313244" rx="8" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="50" y="154" fill="#f9e2af" font-size="12" font-weight="bold">② Phone Screen</text>
  <text x="260" y="154" fill="#585b70" font-size="10">100 candidates</text>
  <text x="50" y="176" fill="#f9e2af" font-size="14">👤👤👤👤👤</text>
  <text x="380" y="176" fill="#f9e2af" font-size="10">30min each</text>

  <!-- Arrow down -->
  <text x="250" y="214" fill="#a6e3a1" font-size="11" text-anchor="middle">↓ 10 finalists</text>

  <!-- Stage 3: In-person -->
  <rect x="30" y="222" width="460" height="68" fill="#313244" rx="8" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="50" y="244" fill="#a6e3a1" font-size="12" font-weight="bold">③ In-Person Interview</text>
  <text x="280" y="244" fill="#585b70" font-size="10">10 finalists</text>
  <text x="50" y="266" fill="#a6e3a1" font-size="14">👤</text>
  <text x="380" y="266" fill="#a6e3a1" font-size="10">2hrs each</text>

  <!-- Mapping banner -->
  <rect x="20" y="305" width="480" height="25" fill="#45475a" rx="4"/>
  <text x="260" y="322" fill="#cdd6f4" font-size="10" text-anchor="middle" font-weight="bold">Same pattern in vector search: cheap → medium → expensive</text>

  <!-- Vector Stage 1 -->
  <rect x="30" y="345" width="460" height="72" fill="#313244" rx="6" stroke="#89b4fa" stroke-width="1"/>
  <text x="50" y="367" fill="#89b4fa" font-size="11" font-weight="bold">BQ / PQ Index</text>
  <text x="50" y="385" fill="#a6adc8" font-size="10">Compressed vectors in RAM</text>
  <text x="50" y="403" fill="#585b70" font-size="10">~0.01ms per vector · Scans millions → 200 candidates</text>

  <!-- Arrow down -->
  <text x="260" y="430" fill="#f9e2af" font-size="11" text-anchor="middle">↓</text>

  <!-- Vector Stage 2 -->
  <rect x="30" y="438" width="460" height="72" fill="#313244" rx="6" stroke="#f9e2af" stroke-width="1"/>
  <text x="50" y="460" fill="#f9e2af" font-size="11" font-weight="bold">Full Vector Re-rank</text>
  <text x="50" y="478" fill="#a6adc8" font-size="10">FP32 from SSD, exact distance</text>
  <text x="50" y="496" fill="#585b70" font-size="10">~0.1ms per vector · 200 candidates → 20</text>

  <!-- Arrow down -->
  <text x="260" y="523" fill="#a6e3a1" font-size="11" text-anchor="middle">↓</text>

  <!-- Vector Stage 3 -->
  <rect x="30" y="531" width="460" height="72" fill="#313244" rx="6" stroke="#a6e3a1" stroke-width="1"/>
  <text x="50" y="553" fill="#a6e3a1" font-size="11" font-weight="bold">Cross-Encoder (optional)</text>
  <text x="50" y="571" fill="#a6adc8" font-size="10">Query + doc through transformer</text>
  <text x="50" y="589" fill="#585b70" font-size="10">~5-10ms per pair · 20 candidates → top 10</text>

  <!-- Bottom insight -->
  <rect x="20" y="615" width="480" height="28" fill="#45475a" rx="4"/>
  <text x="260" y="633" fill="#f9e2af" font-size="10" text-anchor="middle" font-weight="bold">Cascade from cheap-and-rough to expensive-and-precise. That's re-ranking.</text>
</svg>