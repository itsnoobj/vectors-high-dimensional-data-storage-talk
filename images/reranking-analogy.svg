<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace">
  <rect width="800" height="400" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="400" y="25" fill="#cdd6f4" font-size="15" font-weight="bold" text-anchor="middle">Re-ranking: The Hiring Analogy</text>

  <!-- Stage 1: Resume screening -->
  <rect x="30" y="45" width="220" height="130" fill="#313244" rx="8" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="140" y="68" fill="#89b4fa" font-size="12" text-anchor="middle" font-weight="bold">① Resume Screen</text>
  <text x="140" y="85" fill="#585b70" font-size="10" text-anchor="middle">10,000 applicants</text>

  <!-- Stick figures - many -->
  <text x="55" y="115" fill="#585b70" font-size="16">👤👤👤👤👤</text>
  <text x="55" y="140" fill="#585b70" font-size="16">👤👤👤👤👤</text>
  <text x="140" y="165" fill="#89b4fa" font-size="10" text-anchor="middle">30 seconds each</text>

  <!-- Arrow -->
  <line x1="250" y1="110" x2="280" y2="110" stroke="#f9e2af" stroke-width="2"/>
  <text x="265" y="100" fill="#f9e2af" font-size="9" text-anchor="middle">→ 100</text>

  <!-- Stage 2: Phone screen -->
  <rect x="290" y="45" width="220" height="130" fill="#313244" rx="8" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="400" y="68" fill="#f9e2af" font-size="12" text-anchor="middle" font-weight="bold">② Phone Screen</text>
  <text x="400" y="85" fill="#585b70" font-size="10" text-anchor="middle">100 candidates</text>

  <text x="340" y="120" fill="#f9e2af" font-size="16">👤👤👤</text>
  <text x="340" y="145" fill="#585b70" font-size="16">👤👤</text>
  <text x="400" y="165" fill="#f9e2af" font-size="10" text-anchor="middle">30 minutes each</text>

  <!-- Arrow -->
  <line x1="510" y1="110" x2="540" y2="110" stroke="#a6e3a1" stroke-width="2"/>
  <text x="525" y="100" fill="#a6e3a1" font-size="9" text-anchor="middle">→ 10</text>

  <!-- Stage 3: In-person -->
  <rect x="550" y="45" width="220" height="130" fill="#313244" rx="8" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="660" y="68" fill="#a6e3a1" font-size="12" text-anchor="middle" font-weight="bold">③ In-Person Interview</text>
  <text x="660" y="85" fill="#585b70" font-size="10" text-anchor="middle">10 finalists</text>

  <text x="640" y="120" fill="#a6e3a1" font-size="20">👤</text>
  <text x="660" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">2 hours each</text>

  <!-- Mapping to vector search -->
  <rect x="30" y="195" width="740" height="25" fill="#45475a" rx="4"/>
  <text x="400" y="212" fill="#cdd6f4" font-size="12" text-anchor="middle" font-weight="bold">Same pattern in vector search: cheap → medium → expensive, shrinking candidates at each stage</text>

  <!-- Vector search stages -->
  <rect x="30" y="235" width="220" height="90" fill="#313244" rx="6" stroke="#89b4fa" stroke-width="1"/>
  <text x="140" y="255" fill="#89b4fa" font-size="11" text-anchor="middle" font-weight="bold">BQ / PQ Index</text>
  <text x="140" y="272" fill="#a6adc8" font-size="10" text-anchor="middle">Compressed vectors in RAM</text>
  <text x="140" y="289" fill="#585b70" font-size="10" text-anchor="middle">~0.01ms per vector</text>
  <text x="140" y="306" fill="#585b70" font-size="10" text-anchor="middle">Scans millions → 200 candidates</text>

  <line x1="250" y1="280" x2="280" y2="280" stroke="#f9e2af" stroke-width="2"/>

  <rect x="290" y="235" width="220" height="90" fill="#313244" rx="6" stroke="#f9e2af" stroke-width="1"/>
  <text x="400" y="255" fill="#f9e2af" font-size="11" text-anchor="middle" font-weight="bold">Full Vector Re-rank</text>
  <text x="400" y="272" fill="#a6adc8" font-size="10" text-anchor="middle">FP32 from SSD, exact distance</text>
  <text x="400" y="289" fill="#585b70" font-size="10" text-anchor="middle">~0.1ms per vector</text>
  <text x="400" y="306" fill="#585b70" font-size="10" text-anchor="middle">200 candidates → 20</text>

  <line x1="510" y1="280" x2="540" y2="280" stroke="#a6e3a1" stroke-width="2"/>

  <rect x="550" y="235" width="220" height="90" fill="#313244" rx="6" stroke="#a6e3a1" stroke-width="1"/>
  <text x="660" y="255" fill="#a6e3a1" font-size="11" text-anchor="middle" font-weight="bold">Cross-Encoder (optional)</text>
  <text x="660" y="272" fill="#a6adc8" font-size="10" text-anchor="middle">Query + doc through transformer</text>
  <text x="660" y="289" fill="#585b70" font-size="10" text-anchor="middle">~5-10ms per pair</text>
  <text x="660" y="306" fill="#585b70" font-size="10" text-anchor="middle">20 candidates → top 10</text>

  <!-- Bottom insight -->
  <rect x="100" y="345" width="600" height="45" fill="#313244" rx="6"/>
  <text x="400" y="365" fill="#f9e2af" font-size="12" text-anchor="middle" font-weight="bold">You can't interview 10,000 people. You can't run your best model on 1 billion vectors.</text>
  <text x="400" y="382" fill="#a6adc8" font-size="11" text-anchor="middle">Cascade from cheap-and-rough to expensive-and-precise. That's re-ranking.</text>
</svg>
