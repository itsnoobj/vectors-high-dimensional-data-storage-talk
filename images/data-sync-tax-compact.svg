<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" font-family="monospace">
  <rect width="800" height="160" fill="#1e1e2e"/>

  <!-- App -->
  <rect x="320" y="10" width="160" height="30" fill="#89b4fa" rx="4"/>
  <text x="400" y="30" fill="#1e1e2e" font-size="12" text-anchor="middle" font-weight="bold">Your App</text>

  <!-- Split arrows -->
  <line x1="360" y1="40" x2="200" y2="65" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="440" y1="40" x2="600" y2="65" stroke="#f38ba8" stroke-width="1.5"/>

  <!-- PostgreSQL -->
  <rect x="100" y="68" width="200" height="30" fill="#313244" rx="4" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="200" y="88" fill="#a6e3a1" font-size="11" text-anchor="middle" font-weight="bold">PostgreSQL (truth)</text>

  <!-- Vector DB -->
  <rect x="500" y="68" width="200" height="30" fill="#313244" rx="4" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="600" y="88" fill="#f38ba8" font-size="11" text-anchor="middle" font-weight="bold">Vector DB (index)</text>

  <!-- Sync arrow -->
  <line x1="300" y1="83" x2="500" y2="83" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="78" fill="#f9e2af" font-size="9" text-anchor="middle">sync (Kafka/CDC)</text>

  <!-- Failure modes compact -->
  <text x="100" y="125" fill="#f38ba8" font-size="10">❌ Write fails → stale</text>
  <text x="280" y="125" fill="#f38ba8" font-size="10">❌ Delete missed → ghosts</text>
  <text x="470" y="125" fill="#f38ba8" font-size="10">❌ Model update → re-sync all</text>
  <text x="660" y="125" fill="#f38ba8" font-size="10">❌ Perms → leak</text>

  <text x="400" y="152" fill="#f9e2af" font-size="11" text-anchor="middle" font-weight="bold">Two databases = eventual consistency. One database = one source of truth.</text>
</svg>
