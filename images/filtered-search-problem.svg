<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="monospace">
  <rect width="800" height="380" fill="#1e1e2e"/>

  <!-- POST-FILTER side -->
  <text x="200" y="28" fill="#f38ba8" font-size="16" font-weight="bold" text-anchor="middle">Post-Filter (ANN → then filter)</text>
  
  <!-- HNSW graph circle -->
  <circle cx="200" cy="150" r="90" fill="none" stroke="#585b70" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="200" y="60" fill="#585b70" font-size="11" text-anchor="middle">HNSW graph (50K docs)</text>
  
  <!-- ANN results - mix of matching and non-matching -->
  <circle cx="155" cy="110" r="10" fill="#f38ba8"/><text x="155" y="114" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="190" cy="95" r="10" fill="#f38ba8"/><text x="190" y="99" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="225" cy="105" r="10" fill="#a6e3a1"/><text x="225" y="109" fill="#1e1e2e" font-size="9" text-anchor="middle">✓</text>
  <circle cx="160" cy="145" r="10" fill="#f38ba8"/><text x="160" y="149" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="200" cy="135" r="10" fill="#f38ba8"/><text x="200" y="139" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="240" cy="140" r="10" fill="#f38ba8"/><text x="240" y="144" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="170" cy="180" r="10" fill="#a6e3a1"/><text x="170" y="184" fill="#1e1e2e" font-size="9" text-anchor="middle">✓</text>
  <circle cx="210" cy="175" r="10" fill="#f38ba8"/><text x="210" y="179" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="245" cy="185" r="10" fill="#f38ba8"/><text x="245" y="189" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="195" cy="205" r="10" fill="#f38ba8"/><text x="195" y="209" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  
  <!-- Legend -->
  <circle cx="130" cy="260" r="7" fill="#a6e3a1"/>
  <text x="145" y="264" fill="#a6adc8" font-size="11">matches filter</text>
  <circle cx="250" cy="260" r="7" fill="#f38ba8"/>
  <text x="265" y="264" fill="#a6adc8" font-size="11">doesn't match</text>
  
  <text x="200" y="290" fill="#a6adc8" font-size="12" text-anchor="middle">ANN returns top 10 nearest</text>
  <text x="200" y="308" fill="#a6adc8" font-size="12" text-anchor="middle">→ filter: only 2 match tenant_id=42</text>
  <text x="200" y="330" fill="#f38ba8" font-size="14" text-anchor="middle" font-weight="bold">❌ Asked for 10, got 2</text>

  <!-- Divider -->
  <line x1="400" y1="40" x2="400" y2="350" stroke="#585b70" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PRE-FILTER side -->
  <text x="600" y="28" fill="#f9e2af" font-size="16" font-weight="bold" text-anchor="middle">Pre-Filter (filter → then ANN)</text>
  
  <!-- Scattered dots representing filtered results -->
  <circle cx="600" cy="150" r="90" fill="none" stroke="#585b70" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="600" y="60" fill="#585b70" font-size="11" text-anchor="middle">HNSW graph (50K docs)</text>
  
  <!-- Filtered points - scattered across graph, far apart -->
  <circle cx="520" cy="95" r="10" fill="#f9e2af"/>
  <circle cx="670" cy="110" r="10" fill="#f9e2af"/>
  <circle cx="555" cy="190" r="10" fill="#f9e2af"/>
  <circle cx="650" cy="200" r="10" fill="#f9e2af"/>
  <circle cx="590" cy="130" r="10" fill="#f9e2af"/>
  
  <!-- Dotted lines showing scattered traversal -->
  <line x1="520" y1="95" x2="590" y2="130" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="590" y1="130" x2="670" y2="110" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="590" y1="130" x2="555" y2="190" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="555" y1="190" x2="650" y2="200" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  
  <text x="600" y="260" fill="#a6adc8" font-size="12" text-anchor="middle">200 docs match tenant_id=42</text>
  <text x="600" y="278" fill="#a6adc8" font-size="12" text-anchor="middle">→ scattered across graph</text>
  <text x="600" y="296" fill="#a6adc8" font-size="12" text-anchor="middle">→ HNSW can't navigate efficiently</text>
  <text x="600" y="330" fill="#f9e2af" font-size="14" text-anchor="middle" font-weight="bold">❌ Falls back to sequential scan</text>

  <!-- Bottom -->
  <text x="400" y="370" fill="#cdd6f4" font-size="14" text-anchor="middle" font-weight="bold">Both approaches break. You need adaptive filtered search.</text>
</svg>
