<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" font-family="monospace">
  <rect width="500" height="650" fill="#1e1e2e"/>

  <!-- POST-FILTER section -->
  <text x="250" y="28" fill="#f38ba8" font-size="15" font-weight="bold" text-anchor="middle">Post-Filter (ANN → then filter)</text>

  <!-- HNSW graph circle -->
  <circle cx="250" cy="145" r="85" fill="none" stroke="#585b70" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="250" y="52" fill="#585b70" font-size="11" text-anchor="middle">HNSW graph (50K docs)</text>

  <!-- ANN results -->
  <circle cx="205" cy="105" r="10" fill="#f38ba8"/><text x="205" y="109" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="240" cy="90" r="10" fill="#f38ba8"/><text x="240" y="94" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="275" cy="100" r="10" fill="#a6e3a1"/><text x="275" y="104" fill="#1e1e2e" font-size="9" text-anchor="middle">✓</text>
  <circle cx="210" cy="140" r="10" fill="#f38ba8"/><text x="210" y="144" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="250" cy="130" r="10" fill="#f38ba8"/><text x="250" y="134" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="290" cy="135" r="10" fill="#f38ba8"/><text x="290" y="139" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="220" cy="175" r="10" fill="#a6e3a1"/><text x="220" y="179" fill="#1e1e2e" font-size="9" text-anchor="middle">✓</text>
  <circle cx="260" cy="170" r="10" fill="#f38ba8"/><text x="260" y="174" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="295" cy="180" r="10" fill="#f38ba8"/><text x="295" y="184" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>
  <circle cx="245" cy="200" r="10" fill="#f38ba8"/><text x="245" y="204" fill="#1e1e2e" font-size="9" text-anchor="middle">✗</text>

  <!-- Legend -->
  <circle cx="150" cy="248" r="7" fill="#a6e3a1"/>
  <text x="165" y="252" fill="#a6adc8" font-size="11">matches filter</text>
  <circle cx="290" cy="248" r="7" fill="#f38ba8"/>
  <text x="305" y="252" fill="#a6adc8" font-size="11">doesn't match</text>

  <text x="250" y="275" fill="#a6adc8" font-size="11" text-anchor="middle">ANN returns top 10 nearest</text>
  <text x="250" y="292" fill="#a6adc8" font-size="11" text-anchor="middle">→ filter: only 2 match tenant_id=42</text>
  <text x="250" y="315" fill="#f38ba8" font-size="14" text-anchor="middle" font-weight="bold">❌ Asked for 10, got 2</text>

  <!-- Divider -->
  <line x1="60" y1="332" x2="440" y2="332" stroke="#585b70" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PRE-FILTER section -->
  <text x="250" y="358" fill="#f9e2af" font-size="15" font-weight="bold" text-anchor="middle">Pre-Filter (filter → then ANN)</text>

  <!-- HNSW graph circle -->
  <circle cx="250" cy="465" r="85" fill="none" stroke="#585b70" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="250" y="372" fill="#585b70" font-size="11" text-anchor="middle">HNSW graph (50K docs)</text>

  <!-- Filtered points - scattered -->
  <circle cx="180" cy="415" r="10" fill="#f9e2af"/>
  <circle cx="320" cy="430" r="10" fill="#f9e2af"/>
  <circle cx="210" cy="505" r="10" fill="#f9e2af"/>
  <circle cx="300" cy="515" r="10" fill="#f9e2af"/>
  <circle cx="245" cy="450" r="10" fill="#f9e2af"/>

  <!-- Dotted lines showing scattered traversal -->
  <line x1="180" y1="415" x2="245" y2="450" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="245" y1="450" x2="320" y2="430" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="245" y1="450" x2="210" y2="505" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="210" y1="505" x2="300" y2="515" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <text x="250" y="572" fill="#a6adc8" font-size="11" text-anchor="middle">200 docs match tenant_id=42</text>
  <text x="250" y="589" fill="#a6adc8" font-size="11" text-anchor="middle">→ scattered across graph</text>
  <text x="250" y="606" fill="#f9e2af" font-size="14" text-anchor="middle" font-weight="bold">❌ Falls back to sequential scan</text>

  <!-- Bottom -->
  <text x="250" y="638" fill="#cdd6f4" font-size="13" text-anchor="middle" font-weight="bold">Both approaches break. You need adaptive filtered search.</text>
</svg>
