  <rect x="173" y="66" width="24" height="24" fill="#a6e3a1" rx="2"/>
  <rect x="199" y="66" width="24" height="24" fill="#f38ba8" rx="2"/>
  <rect x="225" y="66" width="24" height="24" fill="#89b4fa" rx="2"/>
  <rect x="251" y="66" width="24" height="24" fill="#f9e2af" rx="2"/>
  <rect x="277" y="66" width="24" height="24" fill="#cba6f7" rx="2"/>
  <rect x="95" y="92" width="24" height="24" fill="#fab387" rx="2"/>
  <rect x="121" y="92" width="24" height="24" fill="#94e2d5" rx="2"/>
  <rect x="147" y="92" width="24" height="24" fill="#f5c2e7" rx="2"/>
  <rect x="173" y="92" width="24" height="24" fill="#74c7ec" rx="2"/>
  <rect x="199" y="92" width="24" height="24" fill="#eba0ac" rx="2"/>
  <rect x="225" y="92" width="24" height="24" fill="#b4befe" rx="2"/>
  <rect x="251" y="92" width="24" height="24" fill="#a6e3a1" rx="2"/>
  <rect x="277" y="92" width="24" height="24" fill="#f38ba8" rx="2"/>
  <rect x="95" y="118" width="24" height="24" fill="#89b4fa" rx="2"/>
  <rect x="121" y="118" width="24" height="24" fill="#f9e2af" rx="2"/>
  <rect x="147" y="118" width="24" height="24" fill="#cba6f7" rx="2"/>
  <rect x="173" y="118" width="24" height="24" fill="#fab387" rx="2"/>
  <rect x="199" y="118" width="24" height="24" fill="#94e2d5" rx="2"/>
  <rect x="225" y="118" width="24" height="24" fill="#f5c2e7" rx="2"/>
  <rect x="251" y="118" width="24" height="24" fill="#74c7ec" rx="2"/>
  <rect x="277" y="118" width="24" height="24" fill="#eba0ac" rx="2"/>

  <text x="340" y="75" fill="#a6adc8" font-size="11">4 bytes/value</text>
  <text x="340" y="92" fill="#a6adc8" font-size="11">6 GB / 1M</text>
  <text x="340" y="112" fill="#f38ba8" font-size="12">💰 $5K/mo at 100M</text>

  <!-- Arrow down -->
  <text x="250" y="165" fill="#cdd6f4" font-size="20" text-anchor="middle">↓</text>

  <!-- INT8: 8 boxes -->
  <text x="250" y="195" fill="#cdd6f4" font-size="15" font-weight="bold" text-anchor="middle">INT8 (8-bit) — 8 boxes per value</text>

  <rect x="140" y="208" width="30" height="30" fill="#c06070" rx="2"/>
  <rect x="174" y="208" width="30" height="30" fill="#c0a050" rx="2"/>
  <rect x="208" y="208" width="30" height="30" fill="#70a070" rx="2"/>
  <rect x="242" y="208" width="30" height="30" fill="#5080b0" rx="2"/>
  <rect x="140" y="242" width="30" height="30" fill="#907090" rx="2"/>
  <rect x="174" y="242" width="30" height="30" fill="#b08050" rx="2"/>
  <rect x="208" y="242" width="30" height="30" fill="#609080" rx="2"/>
  <rect x="242" y="242" width="30" height="30" fill="#c080a0" rx="2"/>

  <text x="310" y="235" fill="#a6adc8" font-size="11">1 byte/value</text>
  <text x="310" y="252" fill="#a6adc8" font-size="11">1.5 GB / 1M</text>
  <text x="310" y="272" fill="#a6e3a1" font-size="12">4x smaller · ~98%</text>

  <!-- Arrow down -->
  <text x="250" y="310" fill="#cdd6f4" font-size="20" text-anchor="middle">↓</text>

  <!-- Binary: 1 box -->
  <text x="250" y="340" fill="#cdd6f4" font-size="15" font-weight="bold" text-anchor="middle">Binary (1-bit) — 1 box per value</text>

  <rect x="215" y="355" width="50" height="50" fill="#cdd6f4" rx="3"/>
  <text x="240" y="387" fill="#1e1e2e" font-size="20" text-anchor="middle" font-weight="bold">1</text>

  <text x="300" y="375" fill="#a6adc8" font-size="11">1 bit/value</text>
  <text x="300" y="392" fill="#a6adc8" font-size="11">192 MB / 1M</text>
  <text x="300" y="412" fill="#a6e3a1" font-size="12">32x smaller</text>

  <!-- Memory bars -->
  <text x="250" y="450" fill="#cdd6f4" font-size="13" text-anchor="middle" font-weight="bold">Memory at 100M vectors:</text>

  <rect x="50" y="462" width="400" height="20" fill="#f38ba8" rx="3" opacity="0.7"/>
  <text x="250" y="477" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">FP32: 614 GB</text>

  <rect x="50" y="488" width="100" height="20" fill="#f9e2af" rx="3" opacity="0.7"/>
  <text x="100" y="503" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">INT8: 153 GB</text>

  <rect x="50" y="514" width="13" height="20" fill="#a6e3a1" rx="3" opacity="0.7"/>
  <text x="80" y="529" fill="#a6e3a1" font-size="11" font-weight="bold">Binary: 19 GB</text>

  <!-- Bottom -->
  <text x="250" y="570" fill="#cdd6f4" font-size="12" text-anchor="middle">Search the blurry version fast.</text>
  <text x="250" y="588" fill="#cdd6f4" font-size="12" text-anchor="middle">Re-rank with the sharp version for accuracy.</text>
</svg>
