<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="monospace">
  <rect width="800" height="350" fill="#1e1e2e"/>
  
  <!-- FP32: 32 boxes -->
  <text x="130" y="22" fill="#cdd6f4" font-size="14" font-weight="bold" text-anchor="middle">FP32 (32-bit)</text>
  <text x="130" y="38" fill="#585b70" font-size="10" text-anchor="middle">32 boxes per value</text>
  
  <!-- 4 rows x 8 cols = 32 boxes -->
  <rect x="18" y="48" width="26" height="26" fill="#f38ba8" rx="2"/>
  <rect x="46" y="48" width="26" height="26" fill="#f9e2af" rx="2"/>
  <rect x="74" y="48" width="26" height="26" fill="#a6e3a1" rx="2"/>
  <rect x="102" y="48" width="26" height="26" fill="#89b4fa" rx="2"/>
