  <rect x="251" y="40" width="24" height="24" fill="#94e2d5" rx="2"/>
  <rect x="277" y="40" width="24" height="24" fill="#f5c2e7" rx="2"/>
  <rect x="95" y="66" width="24" height="24" fill="#74c7ec" rx="2"/>
  <rect x="121" y="66" width="24" height="24" fill="#eba0ac" rx="2"/>
