  <rect x="158" y="48" width="26" height="26" fill="#fab387" rx="2"/>
  <rect x="186" y="48" width="26" height="26" fill="#94e2d5" rx="2"/>
  <rect x="214" y="48" width="26" height="26" fill="#f5c2e7" rx="2"/>
  
  <rect x="18" y="76" width="26" height="26" fill="#74c7ec" rx="2"/>
  <rect x="46" y="76" width="26" height="26" fill="#eba0ac" rx="2"/>
  <rect x="74" y="76" width="26" height="26" fill="#b4befe" rx="2"/>
  <rect x="102" y="76" width="26" height="26" fill="#a6e3a1" rx="2"/>
  <rect x="130" y="76" width="26" height="26" fill="#f38ba8" rx="2"/>
  <rect x="158" y="76" width="26" height="26" fill="#89b4fa" rx="2"/>
  <rect x="186" y="76" width="26" height="26" fill="#f9e2af" rx="2"/>
  <rect x="214" y="76" width="26" height="26" fill="#cba6f7" rx="2"/>
  
  <rect x="18" y="104" width="26" height="26" fill="#fab387" rx="2"/>
  <rect x="46" y="104" width="26" height="26" fill="#94e2d5" rx="2"/>
  <rect x="74" y="104" width="26" height="26" fill="#f5c2e7" rx="2"/>
  <rect x="102" y="104" width="26" height="26" fill="#74c7ec" rx="2"/>
  <rect x="130" y="104" width="26" height="26" fill="#eba0ac" rx="2"/>
  <rect x="158" y="104" width="26" height="26" fill="#b4befe" rx="2"/>
  <rect x="186" y="104" width="26" height="26" fill="#a6e3a1" rx="2"/>
  <rect x="214" y="104" width="26" height="26" fill="#f38ba8" rx="2"/>
  
  <rect x="18" y="132" width="26" height="26" fill="#89b4fa" rx="2"/>
  <rect x="46" y="132" width="26" height="26" fill="#f9e2af" rx="2"/>
  <rect x="74" y="132" width="26" height="26" fill="#cba6f7" rx="2"/>
  <rect x="102" y="132" width="26" height="26" fill="#fab387" rx="2"/>
  <rect x="130" y="132" width="26" height="26" fill="#94e2d5" rx="2"/>
  <rect x="158" y="132" width="26" height="26" fill="#f5c2e7" rx="2"/>
  <rect x="186" y="132" width="26" height="26" fill="#74c7ec" rx="2"/>
  <rect x="214" y="132" width="26" height="26" fill="#eba0ac" rx="2"/>
  
  <text x="130" y="178" fill="#a6adc8" font-size="11" text-anchor="middle">4 bytes · 6 GB / 1M</text>
  <text x="130" y="195" fill="#f38ba8" font-size="12" text-anchor="middle">💰 $5,000/mo at 100M</text>

  <!-- Arrow -->
  <text x="272" y="100" fill="#cdd6f4" font-size="28">→</text>

  <!-- INT8: 8 boxes -->
  <text x="400" y="22" fill="#cdd6f4" font-size="14" font-weight="bold" text-anchor="middle">INT8 (8-bit)</text>
  <text x="400" y="38" fill="#585b70" font-size="10" text-anchor="middle">8 boxes per value</text>
  
  <rect x="325" y="60" width="34" height="34" fill="#c06070" rx="2"/>
  <rect x="363" y="60" width="34" height="34" fill="#c0a050" rx="2"/>
  <rect x="401" y="60" width="34" height="34" fill="#70a070" rx="2"/>
  <rect x="439" y="60" width="34" height="34" fill="#5080b0" rx="2"/>
  <rect x="325" y="98" width="34" height="34" fill="#907090" rx="2"/>
  <rect x="363" y="98" width="34" height="34" fill="#b08050" rx="2"/>
  <rect x="401" y="98" width="34" height="34" fill="#609080" rx="2"/>
  <rect x="439" y="98" width="34" height="34" fill="#c080a0" rx="2"/>
  
  <text x="400" y="155" fill="#a6adc8" font-size="11" text-anchor="middle">1 byte · 1.5 GB / 1M</text>
  <text x="400" y="172" fill="#a6e3a1" font-size="12" text-anchor="middle">4x smaller · ~98% recall</text>

  <!-- Arrow -->
  <text x="510" y="100" fill="#cdd6f4" font-size="28">→</text>

  <!-- Binary: 1 box -->
  <text x="650" y="22" fill="#cdd6f4" font-size="14" font-weight="bold" text-anchor="middle">Binary (1-bit)</text>
  <text x="650" y="38" fill="#585b70" font-size="10" text-anchor="middle">1 box per value</text>
  
  <rect x="620" y="72" width="60" height="60" fill="#cdd6f4" rx="3"/>
  <text x="650" y="108" fill="#1e1e2e" font-size="22" text-anchor="middle" font-weight="bold">1</text>
  
  <text x="650" y="155" fill="#a6adc8" font-size="11" text-anchor="middle">1 bit · 192 MB / 1M</text>
  <text x="650" y="172" fill="#a6e3a1" font-size="12" text-anchor="middle">32x smaller · ~92-96% w/ re-rank</text>

  <!-- Size comparison bar at bottom -->
  <text x="400" y="220" fill="#cdd6f4" font-size="13" text-anchor="middle" font-weight="bold">Memory at 100M vectors:</text>
  
  <rect x="80" y="235" width="640" height="22" fill="#f38ba8" rx="3" opacity="0.7"/>
  <text x="400" y="251" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">FP32: 614 GB</text>
  
  <rect x="80" y="263" width="160" height="22" fill="#f9e2af" rx="3" opacity="0.7"/>
  <text x="160" y="279" fill="#1e1e2e" font-size="11" text-anchor="middle" font-weight="bold">INT8: 153 GB</text>
  
  <rect x="80" y="291" width="20" height="22" fill="#a6e3a1" rx="3" opacity="0.7"/>
  <text x="130" y="307" fill="#a6e3a1" font-size="11" text-anchor="start" font-weight="bold">Binary: 19 GB</text>

  <text x="400" y="340" fill="#cdd6f4" font-size="13" text-anchor="middle">Search the blurry version fast. Re-rank with the sharp version for accuracy.</text>
</svg>
