  <text x="250" y="28" fill="#cdd6f4" font-size="15" font-weight="bold" text-anchor="middle">FP32 (32-bit) — 32 boxes per value</text>
  
  <rect x="95" y="40" width="24" height="24" fill="#f38ba8" rx="2"/>
  <rect x="121" y="40" width="24" height="24" fill="#f9e2af" rx="2"/>
