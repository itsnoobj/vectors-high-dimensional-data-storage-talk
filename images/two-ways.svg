<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" font-family="monospace">
  <rect width="500" height="500" fill="#1e1e2e"/>

  <!-- 1. Quantization -->
  <rect x="20" y="20" width="220" height="400" fill="#313244" rx="8" stroke="#4EC9B0" stroke-width="1.5"/>
  <text x="130" y="50" fill="#4EC9B0" font-size="14" text-anchor="middle" font-weight="bold">① Quantization</text>
  
  <rect x="40" y="70" width="40" height="40" fill="#f38ba8" rx="3"/>
  <rect x="84" y="70" width="40" height="40" fill="#f9e2af" rx="3"/>
  <rect x="128" y="70" width="40" height="40" fill="#a6e3a1" rx="3"/>
  <rect x="172" y="70" width="40" height="40" fill="#89b4fa" rx="3"/>
  <rect x="40" y="114" width="40" height="40" fill="#cba6f7" rx="3"/>
  <rect x="84" y="114" width="40" height="40" fill="#fab387" rx="3"/>
  <rect x="128" y="114" width="40" height="40" fill="#94e2d5" rx="3"/>
  <rect x="172" y="114" width="40" height="40" fill="#f5c2e7" rx="3"/>
  
  <text x="130" y="178" fill="#585b70" font-size="16" text-anchor="middle">↓</text>
  
  <rect x="65" y="190" width="22" height="22" fill="#c06070" rx="2"/>
  <rect x="91" y="190" width="22" height="22" fill="#5080b0" rx="2"/>
  <rect x="117" y="190" width="22" height="22" fill="#70a070" rx="2"/>
  <rect x="143" y="190" width="22" height="22" fill="#c0a050" rx="2"/>
  
  <text x="130" y="240" fill="#a6adc8" font-size="11" text-anchor="middle">Shrink each value's</text>
  <text x="130" y="255" fill="#a6adc8" font-size="11" text-anchor="middle">precision</text>
  <text x="130" y="285" fill="#a6e3a1" font-size="13" text-anchor="middle" font-weight="bold">4x – 32x less memory</text>
  <text x="130" y="315" fill="#585b70" font-size="11" text-anchor="middle">Search blurry,</text>
  <text x="130" y="330" fill="#585b70" font-size="11" text-anchor="middle">re-rank sharp</text>
  <text x="130" y="365" fill="#4EC9B0" font-size="11" text-anchor="middle" font-weight="bold">Biggest lever</text>
  <text x="130" y="380" fill="#4EC9B0" font-size="11" text-anchor="middle" font-weight="bold">for most teams</text>

  <!-- 2. DiskANN -->
  <rect x="260" y="20" width="220" height="400" fill="#313244" rx="8" stroke="#4EC9B0" stroke-width="1.5"/>
  <text x="370" y="50" fill="#4EC9B0" font-size="14" text-anchor="middle" font-weight="bold">② DiskANN</text>
  
  <rect x="285" y="70" width="170" height="60" fill="#45475a" rx="4" stroke="#a6e3a1" stroke-width="1"/>
  <text x="370" y="93" fill="#a6e3a1" font-size="11" text-anchor="middle">🧠 RAM</text>
  <text x="370" y="110" fill="#585b70" font-size="10" text-anchor="middle">compressed graph ~25 GB</text>
  
  <text x="370" y="155" fill="#f9e2af" font-size="12" text-anchor="middle">↕ fetch on demand</text>
  
  <rect x="285" y="165" width="170" height="60" fill="#45475a" rx="4" stroke="#89b4fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="370" y="188" fill="#89b4fa" font-size="11" text-anchor="middle">💾 NVMe SSD</text>
  <text x="370" y="205" fill="#585b70" font-size="10" text-anchor="middle">full vectors ~600 GB</text>
  
  <text x="370" y="250" fill="#a6adc8" font-size="11" text-anchor="middle">Navigate graph in RAM</text>
  <text x="370" y="268" fill="#a6adc8" font-size="11" text-anchor="middle">Fetch from SSD to re-rank</text>
  <text x="370" y="300" fill="#a6e3a1" font-size="13" text-anchor="middle" font-weight="bold">Billions on a</text>
  <text x="370" y="318" fill="#a6e3a1" font-size="13" text-anchor="middle" font-weight="bold">single node</text>
  <text x="370" y="365" fill="#4EC9B0" font-size="11" text-anchor="middle" font-weight="bold">When RAM-only</text>
  <text x="370" y="380" fill="#4EC9B0" font-size="11" text-anchor="middle" font-weight="bold">is too expensive</text>

  <!-- Bottom CTA -->
  <rect x="50" y="430" width="400" height="2" fill="#4EC9B0" rx="1"/>
  <text x="250" y="455" fill="#4EC9B0" font-size="13" text-anchor="middle" font-weight="bold">Let's go deep on Quantization —</text>
  <text x="250" y="475" fill="#4EC9B0" font-size="13" text-anchor="middle" font-weight="bold">the biggest lever most teams aren't using.</text>
</svg>
